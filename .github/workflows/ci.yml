name: Python CI Pipeline & Epitech Mirror

# Workflow triggers
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- PYTHON CHECKS ---
  python-ci:
    if: github.repository == 'Nexlein/StartTrek'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.14" ]

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest ruff

      - name: Ruff Linter
        run: ruff check .

      - name: Tests
        run: |
          if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            pytest -q
          else
            echo "No Python tests detected, skipping pytest."
          fi

  # --- MIRROR TO EPITECH ---
  mirror_to_epitech:
    runs-on: ubuntu-latest

    needs: python-ci

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Push to Epitech Mirror
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add epitechStartTrek git@github.com:EpitechPGE2-2025/G-AIA-401-MPL-4-1-starttrek-1.git
          git push epitechStartTrek --mirror
